name: Start Individual Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - chat
          - rag-api
          - code-executor
          - memory
          - m365-mcp
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      ref:
        description: 'Git branch/tag to deploy'
        required: false
        default: 'main'
      cpu_memory:
        description: 'CPU / Memory'
        required: false
        type: choice
        default: 'default'
        options:
          - default
          - '1 vCPU / 2 GB'
          - '2 vCPU / 4 GB'
          - '2 vCPU / 8 GB'
          - '4 vCPU / 8 GB'
          - '8 vCPU / 16 GB'
      min_tasks:
        description: 'Min tasks (auto-scaling minimum)'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '2'
          - '3'
      max_tasks:
        description: 'Max tasks (auto-scaling maximum)'
        required: false
        type: choice
        default: '2'
        options:
          - '1'
          - '2'
          - '3'

  repository_dispatch:
    types:
      - deploy-chat
      - deploy-rag-api
      - deploy-code-executor
      - deploy-memory
      - deploy-m365-mcp

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  resolve:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.resolve.outputs.service }}
      environment: ${{ steps.resolve.outputs.environment }}
      ref: ${{ steps.resolve.outputs.ref }}
      sha: ${{ steps.resolve.outputs.sha }}
      cpu_memory: ${{ steps.resolve.outputs.cpu_memory }}
      min_tasks: ${{ steps.resolve.outputs.min_tasks }}
      max_tasks: ${{ steps.resolve.outputs.max_tasks }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            EVENT_TYPE="${{ github.event.action }}"
            SERVICE="${EVENT_TYPE#deploy-}"
            BRANCH="${{ github.event.client_payload.branch }}"
            SHA="${{ github.event.client_payload.sha }}"
            if [ "$BRANCH" = "main" ]; then ENV="prod"; else ENV="dev"; fi
            echo "service=$SERVICE" >> $GITHUB_OUTPUT
            echo "environment=$ENV" >> $GITHUB_OUTPUT
            echo "ref=$BRANCH" >> $GITHUB_OUTPUT
            echo "sha=$SHA" >> $GITHUB_OUTPUT
            echo "cpu_memory=default" >> $GITHUB_OUTPUT
            echo "min_tasks=1" >> $GITHUB_OUTPUT
            echo "max_tasks=2" >> $GITHUB_OUTPUT
          else
            echo "service=${{ inputs.service }}" >> $GITHUB_OUTPUT
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "ref=${{ inputs.ref || 'main' }}" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
            echo "cpu_memory=${{ inputs.cpu_memory || 'default' }}" >> $GITHUB_OUTPUT
            echo "min_tasks=${{ inputs.min_tasks || '1' }}" >> $GITHUB_OUTPUT
            echo "max_tasks=${{ inputs.max_tasks || '2' }}" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: "Deploy: ${{ needs.resolve.outputs.service }} -> ${{ needs.resolve.outputs.environment }}"
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Clone service repo
        run: |
          SERVICE="${{ needs.resolve.outputs.service }}"
          REF="${{ needs.resolve.outputs.ref }}"
          echo "Cloning illuma-ai/$SERVICE (branch: $REF)..."
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/illuma-ai/$SERVICE.git" \
            ./source
          ls -la ./source

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        working-directory: ./source
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ needs.resolve.outputs.service }}
          ENV: ${{ needs.resolve.outputs.environment }}
        run: |
          IMAGE_REPO="$ECR_REGISTRY/illuma-ai-$SERVICE-$ENV"
          SHA="${{ needs.resolve.outputs.sha || github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          docker build \
            -t "$IMAGE_REPO:$SHA" \
            -t "$IMAGE_REPO:$SHORT_SHA" \
            -t "$IMAGE_REPO:$ENV" \
            -t "$IMAGE_REPO:latest" \
            .
          docker push "$IMAGE_REPO" --all-tags
          echo "image=$IMAGE_REPO:$SHA" >> $GITHUB_OUTPUT

      - name: Override task definition resources
        if: needs.resolve.outputs.cpu_memory != 'default'
        run: |
          TASK_DEF="task-definitions/${{ needs.resolve.outputs.service }}/${{ needs.resolve.outputs.environment }}.json"
          CPU_MEM="${{ needs.resolve.outputs.cpu_memory }}"
          case "$CPU_MEM" in
            "1 vCPU / 2 GB")   CPU="1024";  MEM="2048" ;;
            "2 vCPU / 4 GB")   CPU="2048";  MEM="4096" ;;
            "2 vCPU / 8 GB")   CPU="2048";  MEM="8192" ;;
            "4 vCPU / 8 GB")   CPU="4096";  MEM="8192" ;;
            "8 vCPU / 16 GB")  CPU="8192";  MEM="16384" ;;
          esac
          echo "Overriding $TASK_DEF: CPU=$CPU, Memory=$MEM"
          jq --arg cpu "$CPU" --arg mem "$MEM" '.cpu = $cpu | .memory = $mem' "$TASK_DEF" > tmp.json && mv tmp.json "$TASK_DEF"

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definitions/${{ needs.resolve.outputs.service }}/${{ needs.resolve.outputs.environment }}.json
          container-name: illuma-ai-${{ needs.resolve.outputs.service }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: illuma-ai-${{ needs.resolve.outputs.service }}-svc-${{ needs.resolve.outputs.environment }}
          cluster: illuma-ai-ecs-cluster-${{ needs.resolve.outputs.environment }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Configure auto-scaling
        run: |
          CLUSTER="illuma-ai-ecs-cluster-${{ needs.resolve.outputs.environment }}"
          ECS_SVC="illuma-ai-${{ needs.resolve.outputs.service }}-svc-${{ needs.resolve.outputs.environment }}"
          RESOURCE="service/${CLUSTER}/${ECS_SVC}"
          MIN="${{ needs.resolve.outputs.min_tasks }}"
          MAX="${{ needs.resolve.outputs.max_tasks }}"
          echo "Setting auto-scaling: min=$MIN, max=$MAX"
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "$RESOURCE" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity "$MIN" \
            --max-capacity "$MAX"
          aws application-autoscaling put-scaling-policy \
            --service-namespace ecs \
            --resource-id "$RESOURCE" \
            --scalable-dimension ecs:service:DesiredCount \
            --policy-name "${ECS_SVC}-cpu-scaling" \
            --policy-type TargetTrackingScaling \
            --target-tracking-scaling-policy-configuration '{
              "TargetValue": 70.0,
              "PredefinedMetricSpecification": {
                "PredefinedMetricType": "ECSServiceAverageCPUUtilization"
              },
              "ScaleOutCooldown": 60,
              "ScaleInCooldown": 120
            }' > /dev/null

      - name: Deployment summary
        run: |
          CPU_MEM="${{ needs.resolve.outputs.cpu_memory }}"
          if [ "$CPU_MEM" = "default" ]; then CPU_MEM="task definition default"; fi
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ needs.resolve.outputs.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ needs.resolve.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ needs.resolve.outputs.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ steps.build-image.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CPU/Memory** | $CPU_MEM |" >> $GITHUB_STEP_SUMMARY
          echo "| **Auto-scale** | min=${{ needs.resolve.outputs.min_tasks }}, max=${{ needs.resolve.outputs.max_tasks }} |" >> $GITHUB_STEP_SUMMARY
