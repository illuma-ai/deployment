name: Start Individual Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - chat
          - rag-api
          - code-executor
          - memory
          - m365-mcp
          - nexillo-mcp
          - mongodb
          - observe
          - clickhouse
          - builder
          - redis
          - postgres
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      ref:
        description: 'Git branch/tag (ignored for mongodb, redis, postgres)'
        required: false
        default: 'main'
      cpu_memory:
        description: 'CPU / Memory (ignored for mongodb, redis, postgres)'
        required: false
        type: choice
        default: 'default'
        options:
          - default
          - '1 vCPU / 2 GB'
          - '2 vCPU / 4 GB'
          - '2 vCPU / 8 GB'
          - '4 vCPU / 8 GB'
          - '8 vCPU / 16 GB'
      min_tasks:
        description: 'Min tasks (ignored for redis, postgres)'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '2'
          - '3'
      max_tasks:
        description: 'Max tasks (ignored for redis, postgres)'
        required: false
        type: choice
        default: '2'
        options:
          - '1'
          - '2'
          - '3'

  # repository_dispatch removed — all deployments are manual-only via workflow_dispatch

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  resolve:
    name: Resolve Inputs
    runs-on: ubuntu-latest
    outputs:
      service: ${{ steps.resolve.outputs.service }}
      environment: ${{ steps.resolve.outputs.environment }}
      ref: ${{ steps.resolve.outputs.ref }}
      sha: ${{ steps.resolve.outputs.sha }}
      cpu_memory: ${{ steps.resolve.outputs.cpu_memory }}
      min_tasks: ${{ steps.resolve.outputs.min_tasks }}
      max_tasks: ${{ steps.resolve.outputs.max_tasks }}
      is_managed: ${{ steps.resolve.outputs.is_managed }}
      is_ecs_only: ${{ steps.resolve.outputs.is_ecs_only }}
    steps:
      - name: Resolve inputs
        id: resolve
        run: |
          # Manual workflow_dispatch only
          SVC="${{ inputs.service }}"
          echo "service=$SVC" >> $GITHUB_OUTPUT
          echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          echo "ref=${{ inputs.ref || 'main' }}" >> $GITHUB_OUTPUT
          echo "sha=" >> $GITHUB_OUTPUT
          echo "cpu_memory=${{ inputs.cpu_memory || 'default' }}" >> $GITHUB_OUTPUT
          echo "min_tasks=${{ inputs.min_tasks || '1' }}" >> $GITHUB_OUTPUT
          echo "max_tasks=${{ inputs.max_tasks || '2' }}" >> $GITHUB_OUTPUT
          if [ "$SVC" = "redis" ] || [ "$SVC" = "postgres" ]; then
            echo "is_managed=true" >> $GITHUB_OUTPUT
            echo "is_ecs_only=false" >> $GITHUB_OUTPUT
          elif [ "$SVC" = "mongodb" ] || [ "$SVC" = "clickhouse" ]; then
            echo "is_managed=false" >> $GITHUB_OUTPUT
            echo "is_ecs_only=true" >> $GITHUB_OUTPUT
          else
            echo "is_managed=false" >> $GITHUB_OUTPUT
            echo "is_ecs_only=false" >> $GITHUB_OUTPUT
          fi

  managed:
    name: "Start: ${{ needs.resolve.outputs.service }} in ${{ needs.resolve.outputs.environment }}"
    needs: resolve
    if: needs.resolve.outputs.is_managed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start managed service
        run: |
          SERVICE="${{ needs.resolve.outputs.service }}"
          ENV="${{ needs.resolve.outputs.environment }}"

          echo "## Start Managed Service" >> $GITHUB_STEP_SUMMARY

          if [ "$SERVICE" = "postgres" ]; then
            if [ "$ENV" = "dev" ]; then PG_ID="gaavi-postgres-dev"; else PG_ID="illuma-ai-postgres-prod"; fi
            PG_STATUS=$(aws rds describe-db-instances --db-instance-identifier "$PG_ID" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null)
            if [ "$PG_STATUS" = "stopped" ]; then
              echo "Starting RDS $PG_ID..."
              aws rds start-db-instance --db-instance-identifier "$PG_ID" --no-cli-pager > /dev/null 2>&1
              echo "- **postgres**: Starting" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **postgres**: $PG_STATUS" >> $GITHUB_STEP_SUMMARY
            fi

          elif [ "$SERVICE" = "redis" ]; then
            if [ "$ENV" = "dev" ]; then
              REDIS_ID="gaavi-redis-dev"
              REDIS_SUBNET="gaavi-redis-subnet-dev"
              REDIS_SG="sg-0c13a08315a94c917"
            else
              REDIS_ID="illuma-ai-redis-prod"
              REDIS_SUBNET="illuma-ai-redis-subnet-prod"
              REDIS_SG="sg-092dd549288dd6f6e"
            fi
            REDIS_STATUS=$(aws elasticache describe-cache-clusters --cache-cluster-id "$REDIS_ID" --query 'CacheClusters[0].CacheClusterStatus' --output text 2>/dev/null || echo "not-found")
            if [ "$REDIS_STATUS" = "not-found" ]; then
              echo "Creating ElastiCache $REDIS_ID..."
              aws elasticache create-cache-cluster \
                --cache-cluster-id "$REDIS_ID" \
                --cache-node-type cache.t3.micro \
                --engine redis \
                --num-cache-nodes 1 \
                --cache-subnet-group-name "$REDIS_SUBNET" \
                --security-group-ids "$REDIS_SG" \
                --no-cli-pager > /dev/null 2>&1
              echo "- **redis**: Creating" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **redis**: $REDIS_STATUS" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "- **Environment:** $ENV" >> $GITHUB_STEP_SUMMARY

  start-ecs:
    name: "Start: ${{ needs.resolve.outputs.service }} in ${{ needs.resolve.outputs.environment }}"
    needs: resolve
    if: needs.resolve.outputs.is_ecs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale up ECS service
        run: |
          SERVICE="${{ needs.resolve.outputs.service }}"
          ENV="${{ needs.resolve.outputs.environment }}"
          ECS_SVC="illuma-ai-${SERVICE}-svc-${ENV}"
          CLUSTER="illuma-ai-ecs-cluster-${ENV}"
          MIN="${{ needs.resolve.outputs.min_tasks }}"
          echo "Scaling $ECS_SVC to $MIN in $CLUSTER..."
          aws ecs update-service --cluster "$CLUSTER" --service "$ECS_SVC" --desired-count "$MIN" --no-cli-pager > /dev/null 2>&1
          echo "## Start ECS Service" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** $ECS_SVC" >> $GITHUB_STEP_SUMMARY
          echo "- **Desired count:** $MIN" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** $ENV" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: "Deploy: ${{ needs.resolve.outputs.service }} -> ${{ needs.resolve.outputs.environment }}"
    needs: resolve
    if: needs.resolve.outputs.is_managed == 'false' && needs.resolve.outputs.is_ecs_only == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Clone service repo
        run: |
          SERVICE="${{ needs.resolve.outputs.service }}"
          REF="${{ needs.resolve.outputs.ref }}"
          # Map service name to repo name (when they differ)
          case "$SERVICE" in
            observe) REPO="observability" ;;
            *)       REPO="$SERVICE" ;;
          esac
          echo "Cloning illuma-ai/$REPO (branch: $REF)..."
          git clone --depth 1 --branch "$REF" \
            "https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/illuma-ai/$REPO.git" \
            ./source
          ls -la ./source

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ needs.resolve.outputs.environment == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        working-directory: ./source
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SERVICE: ${{ needs.resolve.outputs.service }}
          ENV: ${{ needs.resolve.outputs.environment }}
        run: |
          IMAGE_REPO="$ECR_REGISTRY/illuma-ai-$SERVICE-$ENV"
          SHA="${{ needs.resolve.outputs.sha || github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          docker build \
            -t "$IMAGE_REPO:$SHA" \
            -t "$IMAGE_REPO:$SHORT_SHA" \
            -t "$IMAGE_REPO:$ENV" \
            -t "$IMAGE_REPO:latest" \
            .
          docker push "$IMAGE_REPO" --all-tags
          echo "image=$IMAGE_REPO:$SHA" >> $GITHUB_OUTPUT

      - name: Override task definition resources
        if: needs.resolve.outputs.cpu_memory != 'default'
        run: |
          TASK_DEF="task-definitions/${{ needs.resolve.outputs.service }}/${{ needs.resolve.outputs.environment }}.json"
          CPU_MEM="${{ needs.resolve.outputs.cpu_memory }}"
          case "$CPU_MEM" in
            "1 vCPU / 2 GB")   CPU="1024";  MEM="2048" ;;
            "2 vCPU / 4 GB")   CPU="2048";  MEM="4096" ;;
            "2 vCPU / 8 GB")   CPU="2048";  MEM="8192" ;;
            "4 vCPU / 8 GB")   CPU="4096";  MEM="8192" ;;
            "8 vCPU / 16 GB")  CPU="8192";  MEM="16384" ;;
          esac
          echo "Overriding $TASK_DEF: CPU=$CPU, Memory=$MEM"
          jq --arg cpu "$CPU" --arg mem "$MEM" '.cpu = $cpu | .memory = $mem' "$TASK_DEF" > tmp.json && mv tmp.json "$TASK_DEF"

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definitions/${{ needs.resolve.outputs.service }}/${{ needs.resolve.outputs.environment }}.json
          container-name: illuma-ai-${{ needs.resolve.outputs.service }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: illuma-ai-${{ needs.resolve.outputs.service }}-svc-${{ needs.resolve.outputs.environment }}
          cluster: illuma-ai-ecs-cluster-${{ needs.resolve.outputs.environment }}
          wait-for-service-stability: true
          wait-for-minutes: 15

      - name: Configure auto-scaling
        run: |
          CLUSTER="illuma-ai-ecs-cluster-${{ needs.resolve.outputs.environment }}"
          ECS_SVC="illuma-ai-${{ needs.resolve.outputs.service }}-svc-${{ needs.resolve.outputs.environment }}"
          RESOURCE="service/${CLUSTER}/${ECS_SVC}"
          MIN="${{ needs.resolve.outputs.min_tasks }}"
          MAX="${{ needs.resolve.outputs.max_tasks }}"
          echo "Setting auto-scaling: min=$MIN, max=$MAX"
          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "$RESOURCE" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity "$MIN" \
            --max-capacity "$MAX"
          aws application-autoscaling put-scaling-policy \
            --service-namespace ecs \
            --resource-id "$RESOURCE" \
            --scalable-dimension ecs:service:DesiredCount \
            --policy-name "${ECS_SVC}-cpu-scaling" \
            --policy-type TargetTrackingScaling \
            --target-tracking-scaling-policy-configuration '{
              "TargetValue": 70.0,
              "PredefinedMetricSpecification": {
                "PredefinedMetricType": "ECSServiceAverageCPUUtilization"
              },
              "ScaleOutCooldown": 60,
              "ScaleInCooldown": 120
            }' > /dev/null

      - name: Deployment summary
        run: |
          CPU_MEM="${{ needs.resolve.outputs.cpu_memory }}"
          if [ "$CPU_MEM" = "default" ]; then CPU_MEM="task definition default"; fi
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Service** | ${{ needs.resolve.outputs.service }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ${{ needs.resolve.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ needs.resolve.outputs.ref }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | ${{ steps.build-image.outputs.image }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **CPU/Memory** | $CPU_MEM |" >> $GITHUB_STEP_SUMMARY
          echo "| **Auto-scale** | min=${{ needs.resolve.outputs.min_tasks }}, max=${{ needs.resolve.outputs.max_tasks }} |" >> $GITHUB_STEP_SUMMARY
