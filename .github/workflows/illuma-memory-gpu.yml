name: illuma-memory GPU (dev test box)

# Lifecycle control for the illuma-memory GPU dev test instance (single g6.xlarge
# running the docker-compose stack: memory + postgres/pgvector + neo4j on a
# dedicated NVIDIA L4). This is the cost kill-switch — STOP terminates GPU
# billing (only the EBS volume + Elastic IP remain, a few $/month). The Elastic
# IP and the seeded model-cache volume persist across stop/start, so START brings
# the same endpoint back warm in ~2-3 min (containers auto-restart on boot).
#
#   START    -> ec2 start-instances  (endpoint live again)
#   STOP     -> ec2 stop-instances    (GPU cost -> $0)
#   STATUS   -> instance state + /health
#   REDEPLOY -> git reset --hard + prune + build + EXPLICIT force-recreate of the app
#               service + on-box health gate; the workflow WAITS for the SSM command and
#               FAILS on non-Success (app code is COPY-baked, so the container must be
#               force-recreated onto the new image — a green run == deployed + healthy,
#               not merely dispatched)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [start, stop, status, redeploy]
      branch:
        description: 'Branch to deploy (redeploy only)'
        required: false
        default: 'hardening/enterprise'
        type: string
  schedule:
    - cron: '0 4 * * *'   # nightly auto-stop (11 PM EST) — cost safety net

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-024d902670f9dd4b7
  ELASTIC_IP: 3.230.194.197
  PORT: '8002'

jobs:
  control:
    name: "illuma-memory-gpu: ${{ inputs.action || 'stop (scheduled)' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run action
        run: |
          ACTION="${{ inputs.action || 'stop' }}"
          IID="${{ env.INSTANCE_ID }}"
          EIP="${{ env.ELASTIC_IP }}"
          echo "## illuma-memory GPU — $ACTION" >> $GITHUB_STEP_SUMMARY

          case "$ACTION" in
            stop)
              aws ec2 stop-instances --instance-ids "$IID" --no-cli-pager >/dev/null
              echo "- Instance **stopping** — GPU billing -> \$0 (EBS + EIP persist)" >> $GITHUB_STEP_SUMMARY
              ;;
            start)
              # GPU (L4) capacity in a single AZ can be transiently unavailable —
              # retry on InsufficientInstanceCapacity (usually frees within minutes).
              ok=""
              for try in 1 2 3 4 5 6 7 8; do
                if aws ec2 start-instances --instance-ids "$IID" --no-cli-pager 2>/tmp/e >/dev/null; then ok=1; break; fi
                echo "  start attempt $try: $(tail -1 /tmp/e | head -c 100); retrying..."; sleep 45
              done
              if [ -z "$ok" ]; then
                echo "- ❌ Could not start — no GPU capacity in the AZ after retries. Try again shortly." >> $GITHUB_STEP_SUMMARY
                exit 1
              fi
              aws ec2 wait instance-running --instance-ids "$IID"
              echo "- Instance **started** — endpoint warming up (~1-3 min, models load from cache)" >> $GITHUB_STEP_SUMMARY
              echo "- Endpoint: http://$EIP:${{ env.PORT }}" >> $GITHUB_STEP_SUMMARY
              ;;
            status)
              STATE=$(aws ec2 describe-instances --instance-ids "$IID" --query 'Reservations[0].Instances[0].State.Name' --output text)
              echo "- Instance state: **$STATE**" >> $GITHUB_STEP_SUMMARY
              if [ "$STATE" = "running" ]; then
                HEALTH=$(curl -fsS --max-time 5 "http://$EIP:${{ env.PORT }}/health" || echo "not-ready")
                echo "- /health: \`$HEALTH\`" >> $GITHUB_STEP_SUMMARY
              fi
              ;;
            redeploy)
              # app code is COPY-baked into the image at build time (not bind-mounted). A bare
              # `up -d --build --force-recreate` has proven UNRELIABLE at swapping the running
              # container (build succeeds + tags a new image, but the old container keeps serving
              # stale code — "green != deployed"). This does it verified + SYNCHRONOUS on the box:
              #   1. git reset --hard to the branch tip
              #   2. prune (repeated multi-GB CUDA rebuilds fill the disk; a full disk makes new
              #      layer extraction fail with "no space left" and the old container keeps running)
              #   3. build the new image
              #   4. EXPLICITLY force-recreate ONLY the app service onto the new image (the belt-
              #      and-suspenders swap the bare command misses)
              #   5. health-gate on the box (curl localhost/health; `set -e` fails the command if
              #      it never comes healthy)
              # The workflow then WAITS for the SSM command to finish and FAILS the run on any
              # non-Success status — so a green run means actually deployed + healthy, not merely
              # dispatched.
              BRANCH="${{ inputs.branch || 'hardening/enterprise' }}"
              CID=$(aws ssm send-command --instance-ids "$IID" --document-name AWS-RunShellScript \
                --parameters 'commands=["set -e","cd /opt/illuma-memory","git fetch origin","git reset --hard origin/${{ inputs.branch || 'hardening/enterprise' }}","docker builder prune -af || true","docker image prune -af || true","docker compose -p illuma-memory -f docker-compose.yml -f docker-compose.gpu.yml --profile kg up -d --build","docker compose -p illuma-memory -f docker-compose.yml -f docker-compose.gpu.yml --profile kg up -d --no-deps --force-recreate illuma-memory","for i in $(seq 1 40); do curl -fsS --max-time 5 http://localhost:${{ env.PORT }}/health >/dev/null && break || sleep 6; done","curl -fsS --max-time 5 http://localhost:${{ env.PORT }}/health","echo DEPLOYED_HEAD=$(git rev-parse --short HEAD)"]' \
                --timeout-seconds 2400 --query 'Command.CommandId' --output text)
              echo "- Redeploy SSM command \`$CID\` (branch \`$BRANCH\`) — building + force-recreating on the box, waiting for completion..." >> $GITHUB_STEP_SUMMARY
              # Build can take 10-15 min; the built-in `command-executed` waiter is too short, so poll.
              STATUS=Pending
              for i in $(seq 1 130); do
                STATUS=$(aws ssm get-command-invocation --command-id "$CID" --instance-id "$IID" --query Status --output text 2>/dev/null || echo Pending)
                case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
                sleep 20
              done
              OUT=$(aws ssm get-command-invocation --command-id "$CID" --instance-id "$IID" --query StandardOutputContent --output text 2>/dev/null || true)
              ERR=$(aws ssm get-command-invocation --command-id "$CID" --instance-id "$IID" --query StandardErrorContent --output text 2>/dev/null || true)
              echo "- SSM status: **$STATUS**" >> $GITHUB_STEP_SUMMARY
              { echo '```'; echo "$OUT" | tail -25; echo '```'; } >> $GITHUB_STEP_SUMMARY
              if [ "$STATUS" != "Success" ]; then
                echo "- ❌ Redeploy did NOT complete healthy (status $STATUS) — the old container may still be serving. See output/stderr above." >> $GITHUB_STEP_SUMMARY
                echo "::error::redeploy failed with SSM status $STATUS"
                echo "$ERR" | tail -25
                exit 1
              fi
              echo "- ✅ Redeployed: container force-recreated onto the new image and /health OK. Endpoint: http://$EIP:${{ env.PORT }}" >> $GITHUB_STEP_SUMMARY
              ;;
          esac
