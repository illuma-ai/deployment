name: Stop Individual Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to stop'
        required: true
        type: choice
        options:
          - chat
          - rag-api
          - code-executor
          - memory
          - m365-mcp
          - mongodb
          - redis
          - postgres
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  stop:
    name: "Stop: ${{ inputs.service }} in ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.environment == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ inputs.environment == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Stop service
        run: |
          SERVICE="${{ inputs.service }}"
          ENV="${{ inputs.environment }}"

          echo "## Service Stopped" >> $GITHUB_STEP_SUMMARY

          if [ "$SERVICE" = "postgres" ]; then
            # RDS stop
            if [ "$ENV" = "dev" ]; then PG_ID="gaavi-postgres-dev"; else PG_ID="illuma-ai-postgres-prod"; fi
            echo "Stopping RDS instance $PG_ID..."
            if aws rds stop-db-instance --db-instance-identifier "$PG_ID" --no-cli-pager > /dev/null 2>&1; then
              echo "- **postgres**: Stopped" >> $GITHUB_STEP_SUMMARY
            else
              STATUS=$(aws rds describe-db-instances --db-instance-identifier "$PG_ID" --query 'DBInstances[0].DBInstanceStatus' --output text 2>/dev/null)
              echo "- **postgres**: $STATUS (may already be stopped)" >> $GITHUB_STEP_SUMMARY
            fi

          elif [ "$SERVICE" = "redis" ]; then
            # ElastiCache delete (no native stop)
            if [ "$ENV" = "dev" ]; then REDIS_ID="gaavi-redis-dev"; else REDIS_ID="illuma-ai-redis-prod"; fi
            echo "Deleting ElastiCache cluster $REDIS_ID..."
            if aws elasticache delete-cache-cluster --cache-cluster-id "$REDIS_ID" --no-cli-pager > /dev/null 2>&1; then
              echo "- **redis**: Deleting" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **redis**: Already deleted or not found" >> $GITHUB_STEP_SUMMARY
            fi

          else
            # ECS service
            ECS_SVC="illuma-ai-${SERVICE}-svc-${ENV}"
            CLUSTER="illuma-ai-ecs-cluster-${ENV}"
            echo "Scaling $ECS_SVC to 0 in $CLUSTER..."
            aws ecs update-service --cluster "$CLUSTER" --service "$ECS_SVC" --desired-count 0 --no-cli-pager
            echo "- **Service:** $ECS_SVC" >> $GITHUB_STEP_SUMMARY
          fi

          echo "- **Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
