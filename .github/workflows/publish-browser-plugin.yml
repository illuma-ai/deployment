name: Publish Browser Plugin

# Lightweight trigger — actual build & publish workflow lives in illuma-ai/browser-plugin
# This workflow receives the dispatch from browser-plugin's notify-deploy and
# triggers the publish workflow back in the private repo.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish (branch or SHA)'
        required: false
        default: 'main'

  repository_dispatch:
    types:
      - deploy-browser-plugin

jobs:
  trigger-publish:
    name: Trigger Chrome Web Store Publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.branch }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.client_payload.sha }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ inputs.ref || 'main' }}" >> $GITHUB_OUTPUT
            echo "sha=" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch publish to browser-plugin repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CODE_REPO_PAT }}
          repository: illuma-ai/browser-plugin
          event-type: publish-browser-plugin
          client-payload: >-
            {"ref":"${{ steps.resolve.outputs.ref }}","sha":"${{ steps.resolve.outputs.sha }}"}

      - name: Summary
        run: |
          echo "## Browser Plugin Publish Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref:** ${{ steps.resolve.outputs.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** ${{ steps.resolve.outputs.sha || 'latest' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** illuma-ai/browser-plugin publish workflow" >> $GITHUB_STEP_SUMMARY
