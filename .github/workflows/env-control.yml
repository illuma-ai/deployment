name: Start All Services

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      cpu_memory:
        description: 'CPU / Memory override for all services'
        required: false
        type: choice
        default: 'default'
        options:
          - default
          - '1 vCPU / 2 GB'
          - '2 vCPU / 4 GB'
          - '2 vCPU / 8 GB'
          - '4 vCPU / 8 GB'
          - '8 vCPU / 16 GB'
      min_tasks:
        description: 'Tasks per service'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '2'
          - '3'

  schedule:
    - cron: '0 13 * * *'   # Auto-start dev at 8 AM EST daily

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  start:
    name: "Start all - ${{ inputs.environment || 'dev' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ (inputs.environment || 'dev') == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ (inputs.environment || 'dev') == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start all services
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          CLUSTER="illuma-ai-ecs-cluster-$ENV"
          SERVICES="chat rag-api code-executor memory m365-mcp"
          MIN_TASKS="${{ inputs.min_tasks || '1' }}"
          CPU_MEM="${{ inputs.cpu_memory || 'default' }}"

          # Parse CPU/Memory override
          CPU="" ; MEM=""
          if [ "$CPU_MEM" != "default" ]; then
            case "$CPU_MEM" in
              "1 vCPU / 2 GB")   CPU="1024";  MEM="2048" ;;
              "2 vCPU / 4 GB")   CPU="2048";  MEM="4096" ;;
              "2 vCPU / 8 GB")   CPU="2048";  MEM="8192" ;;
              "4 vCPU / 8 GB")   CPU="4096";  MEM="8192" ;;
              "8 vCPU / 16 GB")  CPU="8192";  MEM="16384" ;;
            esac
          fi

          echo "## Start All Services ($ENV)" >> $GITHUB_STEP_SUMMARY
          if [ -n "$CPU" ]; then
            echo "**CPU/Memory override:** $CPU_MEM" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Desired | CPU/Mem | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for SVC in $SERVICES; do
            ECS_SVC="illuma-ai-${SVC}-svc-${ENV}"
            APPLIED_CPU="default"

            # If CPU/Memory override, update task definition
            if [ -n "$CPU" ]; then
              TD_FAMILY="illuma-ai-${SVC}-td-${ENV}"
              CURRENT_TD=$(aws ecs describe-task-definition --task-definition "$TD_FAMILY" --query 'taskDefinition' --output json 2>/dev/null)
              if [ -n "$CURRENT_TD" ]; then
                NEW_TD=$(echo "$CURRENT_TD" | jq --arg cpu "$CPU" --arg mem "$MEM" \
                  '{family: .family, networkMode: .networkMode, requiresCompatibilities: .requiresCompatibilities, cpu: $cpu, memory: $mem, executionRoleArn: .executionRoleArn, taskRoleArn: .taskRoleArn, containerDefinitions: .containerDefinitions}')
                echo "$NEW_TD" > /tmp/td-${SVC}.json
                aws ecs register-task-definition --cli-input-json "file:///tmp/td-${SVC}.json" --no-cli-pager > /dev/null 2>&1
                aws ecs update-service --cluster "$CLUSTER" --service "$ECS_SVC" --task-definition "$TD_FAMILY" --desired-count "$MIN_TASKS" --no-cli-pager > /dev/null 2>&1
                APPLIED_CPU="$CPU_MEM"
              fi
            else
              aws ecs update-service --cluster "$CLUSTER" --service "$ECS_SVC" --desired-count "$MIN_TASKS" --no-cli-pager > /dev/null 2>&1
            fi

            if [ $? -eq 0 ]; then
              echo "| $SVC | $MIN_TASKS | $APPLIED_CPU | OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $SVC | $MIN_TASKS | $APPLIED_CPU | FAILED |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Wait for services
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          CLUSTER="illuma-ai-ecs-cluster-$ENV"
          echo "Waiting 90s for services..."
          sleep 90
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Health Check" >> $GITHUB_STEP_SUMMARY
          for SVC in chat rag-api code-executor memory m365-mcp; do
            COUNT=$(aws ecs describe-services --cluster "$CLUSTER" --services "illuma-ai-${SVC}-svc-${ENV}" --query 'services[0].runningCount' --output text 2>/dev/null || echo "N/A")
            echo "- **$SVC**: $COUNT running" >> $GITHUB_STEP_SUMMARY
          done
