name: Environment Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - stop-all
          - start-all
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod

  schedule:
    - cron: '0 4 * * *'   # Auto-stop dev at 11 PM EST
    - cron: '0 13 * * *'   # Auto-start dev at 8 AM EST daily

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  control:
    name: "${{ inputs.action || (github.event.schedule == '0 13 * * 1-5' && 'start-all' || 'stop-all') }} - ${{ inputs.environment || 'dev' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ (inputs.environment || 'dev') == 'prod' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ (inputs.environment || 'dev') == 'prod' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale all services
        run: |
          # For scheduled runs: 8 AM EST cron = start-all, 11 PM EST cron = stop-all
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "0 13 * * *" ]; then
              ACTION="start-all"
            else
              ACTION="stop-all"
            fi
          else
            ACTION="${{ inputs.action }}"
          fi
          ENV="${{ inputs.environment || 'dev' }}"
          CLUSTER="illuma-ai-ecs-cluster-$ENV"
          SERVICES="chat rag-api code-executor memory m365-mcp"

          echo "## Environment Control: $ACTION ($ENV)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ECS Service | Desired | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for SVC in $SERVICES; do
            ECS_SVC="illuma-ai-${SVC}-svc-${ENV}"
            if [ "$ACTION" = "stop-all" ]; then
              DESIRED=0
            else
              case "$SVC" in
                chat|rag-api|code-executor|memory) DESIRED=2 ;;
                m365-mcp) DESIRED=1 ;;
                *) DESIRED=1 ;;
              esac
            fi
            echo "Scaling $ECS_SVC to $DESIRED..."
            if aws ecs update-service --cluster "$CLUSTER" --service "$ECS_SVC" --desired-count "$DESIRED" --no-cli-pager > /dev/null 2>&1; then
              echo "| $SVC | $ECS_SVC | $DESIRED | OK |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $SVC | $ECS_SVC | $DESIRED | FAILED (may not exist) |" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Wait for services (start only)
        if: inputs.action == 'start-all' || (github.event_name == 'schedule' && github.event.schedule == '0 13 * * *')
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          CLUSTER="illuma-ai-ecs-cluster-$ENV"
          echo "Waiting 90s for services..."
          sleep 90
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Health Check" >> $GITHUB_STEP_SUMMARY
          for SVC in chat rag-api code-executor memory m365-mcp; do
            COUNT=$(aws ecs describe-services --cluster "$CLUSTER" --services "illuma-ai-${SVC}-svc-${ENV}" --query 'services[0].runningCount' --output text 2>/dev/null || echo "N/A")
            echo "- **$SVC**: $COUNT running" >> $GITHUB_STEP_SUMMARY
          done
